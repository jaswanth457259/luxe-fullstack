# ─────────────────────────────────────────────────────────────────────────────
# deploy-staging.yml — Deploy to Staging Environment
# Triggers: Push to `staging` branch (after CI passes)
# Deploys:  Backend → Railway Staging | Frontend → Vercel Preview
# ─────────────────────────────────────────────────────────────────────────────

name: 🚧 Deploy — Staging

on:
  push:
    branches: [staging]

# Only one staging deploy at a time
concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # ── Build Backend Docker Image and Push to GHCR ───────────────────────────
  build-backend:
    name: 🔨 Build Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Maven Package (skip tests — already ran in CI)
        working-directory: ./backend
        run: mvn package -DskipTests -q

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:staging
            ghcr.io/${{ github.repository }}/backend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy Backend to Railway (Staging) ───────────────────────────────────
  deploy-backend-staging:
    name: 🚂 Deploy Backend → Railway Staging
    runs-on: ubuntu-latest
    needs: [build-backend]
    environment:
      name: staging
      url: https://luxe-api-staging.railway.app

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy to Railway Staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_SERVICE_ID_STAGING }} \
            --environment staging \
            --detach
          echo "✅ Backend deployed to Railway Staging"

      - name: ⏳ Wait for Deployment Health Check
        run: |
          echo "Waiting for staging backend to be healthy..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://luxe-api-staging.railway.app/api/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/30: Status=$STATUS. Retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 minutes"
          exit 1

  # ── Deploy Frontend to Vercel (Preview) ───────────────────────────────────
  deploy-frontend-staging:
    name: ⚛️  Deploy Frontend → Vercel Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://luxe-staging.vercel.app

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🏗️ Build for Staging
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://luxe-api-staging.railway.app/api
          VITE_ENV: staging

      - name: 🚀 Deploy to Vercel Staging
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          alias-domains: luxe-staging.vercel.app

  # ── Run Integration Tests Against Staging ─────────────────────────────────
  integration-tests:
    name: 🧪 Integration Tests on Staging
    runs-on: ubuntu-latest
    needs: [deploy-backend-staging, deploy-frontend-staging]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧪 Run API Smoke Tests
        run: |
          BASE="https://luxe-api-staging.railway.app/api"
          EMAIL="smoke-$(date +%s)@luxe.test"
          PASSWORD="SmokeTest123!"

          echo "Testing /auth/register..."
          RESPONSE=$(curl -s -X POST "$BASE/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\",\"fullName\":\"Smoke Test\"}")
          TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null)
          
          if [ -z "$TOKEN" ]; then
            echo "❌ Registration test FAILED"
            exit 1
          fi
          echo "✅ Registration test passed"

          echo "Testing GET /products..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/products")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Products endpoint test FAILED (status: $STATUS)"
            exit 1
          fi
          echo "✅ Products endpoint test passed"

          echo "Testing authenticated /cart..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" "$BASE/cart")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Auth test FAILED (status: $STATUS)"
            exit 1
          fi
          echo "✅ Auth test passed"

          echo "🎉 All smoke tests passed on staging!"

  # ── Notify Team on Slack/Discord (optional) ───────────────────────────────
  notify:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: always()

    steps:
      - name: 📢 Post Deploy Summary
        run: |
          STATUS="${{ needs.integration-tests.result }}"
          if [ "$STATUS" = "success" ]; then
            echo "✅ Staging deploy succeeded! Ready for production promotion."
          else
            echo "❌ Staging deploy failed. Check the workflow logs."
          fi
