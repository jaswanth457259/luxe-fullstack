# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Continuous Integration
# Triggers: Every push and pull request to dev, staging, main
# Runs: Backend tests (JUnit/Mockito) + Frontend tests + SonarQube analysis
# ─────────────────────────────────────────────────────────────────────────────

name: 🔬 CI — Build & Test

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # ── Backend: Compile, Test, Coverage ─────────────────────────────────────
  backend-ci:
    name: 🔧 Backend CI (Java + JUnit + Mockito)
    runs-on: ubuntu-latest

    services:
      # Spin up a real MySQL container for integration tests
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: luxe_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for SonarQube

      - name: ☕ Set Up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build Backend
        working-directory: ./backend
        run: mvn clean compile -q

      - name: 🧪 Run Unit Tests (JUnit 5 + Mockito)
        working-directory: ./backend
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/luxe_test
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: testpassword
          APP_JWT_SECRET: TestSecretKey2026_AtLeast256BitsLongForHMACSHA256!!
          APP_JWT_EXPIRATION: 3600000

      - name: 📊 Generate JaCoCo Code Coverage Report
        working-directory: ./backend
        run: mvn jacoco:report

      - name: 📋 Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit

      - name: 🔍 SonarQube Analysis
        working-directory: ./backend
        run: >
          mvn sonar:sonar
          -Dsonar.projectKey=luxe-ecommerce-backend
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # Don't fail build if Sonar token not set

      - name: 📦 Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/target/site/jacoco/

  # ── Frontend: Install, Lint, Test, Build ──────────────────────────────────
  frontend-ci:
    name: ⚛️  Frontend CI (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Set Up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔎 Detect Frontend Scripts
        id: frontend-scripts
        working-directory: ./frontend
        run: |
          node -e "const scripts=require('./package.json').scripts || {}; console.log('has_lint=' + Boolean(scripts.lint)); console.log('has_test=' + Boolean(scripts.test));" >> "$GITHUB_OUTPUT"

      - name: 🔍 ESLint Check
        if: steps.frontend-scripts.outputs.has_lint == 'true'
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: false

      - name: ℹ️ Skip ESLint Check
        if: steps.frontend-scripts.outputs.has_lint != 'true'
        run: echo "No frontend lint script configured; skipping ESLint step."

      - name: 🧪 Run Frontend Tests
        if: steps.frontend-scripts.outputs.has_test == 'true'
        working-directory: ./frontend
        run: npm test -- --run
        env:
          CI: true

      - name: ℹ️ Skip Frontend Tests
        if: steps.frontend-scripts.outputs.has_test != 'true'
        run: echo "No frontend test script configured; skipping test step."

      - name: 🏗️ Build Production Bundle
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api

      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ── Docker Build Validation ────────────────────────────────────────────────
  docker-validate:
    name: 🐳 Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-ci]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set Up Java for Maven Package
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Package Backend JAR (skip tests)
        working-directory: ./backend
        run: mvn package -DskipTests -q

      - name: 🐳 Build Docker Image
        working-directory: ./backend
        run: |
          docker build -t luxe-backend:ci-${{ github.sha }} .
          echo "✅ Docker image built successfully"

  # ── Security Scan (OWASP + Trivy — as per PDF) ────────────────────────────
  security-scan:
    name: 🔒 Security Scan (OWASP + Trivy)
    runs-on: ubuntu-latest
    needs: [backend-ci]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set Up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🛡️ OWASP Dependency Check
        working-directory: ./backend
        run: >
          mvn org.owasp:dependency-check-maven:check
          -DfailBuildOnCVSS=9
          -DsuppressionFile=../docs/owasp-suppressions.xml
        continue-on-error: true

      - name: 🔍 Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: 📤 Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ── Final Gate: All checks must pass ──────────────────────────────────────
  ci-gate:
    name: ✅ CI Gate (All checks passed)
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, docker-validate]
    if: always()

    steps:
      - name: Check All Jobs Passed
        run: |
          if [[ "${{ needs.backend-ci.result }}" != "success" || \
                "${{ needs.frontend-ci.result }}" != "success" || \
                "${{ needs.docker-validate.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed!"
            exit 1
          fi
          echo "✅ All CI checks passed! Safe to deploy."
